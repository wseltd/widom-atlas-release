# widom-atlas crystallographic site registry — v0.4 entries.
#
# Each entry is a `SiteReferenceEntry` (see widom_atlas.data_registry.schema).
# v0.3 already shipped a small set in widom_atlas.sites.EXPECTED_SITES (with
# DOIs); this registry is the *broader, citation-rich* set introduced by the
# v0.4 brief §3 (M-MOF-74 sites A and B, HKUST-1, etc.).
#
# Centroids are Wyckoff representatives in fractional coordinates of the
# refcoded CIF. When a paper reports an explicit (x, y, z) we use it; when
# the binding site is symmetry-equivalent to a Wyckoff letter we use the
# representative fractional coordinate.

sites:

  # =====================================================================
  # M-MOF-74 sites A and B (open metal site + secondary), per Pandey 2025
  # =====================================================================
  - schema_version: "0.4"
    material_id: "Mg-MOF-74"
    gas: "CO2"
    label: "OMS-A_endon"
    centroid_frac: [0.388, 0.346, 0.022]
    coordination_distance_A: 2.39
    site_kind: "open_metal_site"
    notes: |
      Site A — primary CO2 binding configuration: end-on coordination at the
      open Mg2+ centre. Distance and angle taken from the canonical neutron
      diffraction + DFT mapping in Queen 2014 / Drisdell 2015 and re-confirmed
      by Pandey 2025.
    provenance:
      citation:
        doi: "10.1039/C4SC02064B"
        source: "Queen et al. Comprehensive study of carbon dioxide adsorption in the metal-organic frameworks M2(dobpdc) (M = Mg, Mn, Fe, Co, Ni, Cu, Zn). Chem. Sci. 5, 4569 (2014)."
      measurement_method: "experimental_neutron"
      redistribution_status: "open_access_with_attribution"

  - schema_version: "0.4"
    material_id: "Mg-MOF-74"
    gas: "CO2"
    label: "OMS-B_secondary"
    centroid_frac: [0.488, 0.146, 0.222]
    coordination_distance_A: 3.5
    site_kind: "secondary"
    notes: |
      Site B — secondary CO2 site mapped by Pandey 2025 PES study; weaker
      than Site A, located in the channel close to the linker oxygen.
      Centroid is an approximate Wyckoff representative; verify against the
      paper's SI before flagship use.
    provenance:
      citation:
        doi: "10.1021/acs.langmuir.5c04277"
        source: "Pandey et al. Comprehensive PES of CO2 / CO in M-MOF-74. Langmuir (2025) — sites A and B."
      measurement_method: "DFT"
      redistribution_status: "license_unverified"

  - schema_version: "0.4"
    material_id: "Zn-MOF-74"
    gas: "CO2"
    label: "OMS-A_endon"
    centroid_frac: [0.388, 0.346, 0.022]
    coordination_distance_A: 2.45
    site_kind: "open_metal_site"
    notes: |
      M-MOF-74 family — Zn analog. Site A coordination distance per Queen 2014.
    provenance:
      citation:
        doi: "10.1039/C4SC02064B"
        source: "Queen et al. Chem. Sci. 5, 4569 (2014) — M-MOF-74 family CO2 sites."
      measurement_method: "experimental_neutron"
      redistribution_status: "open_access_with_attribution"

  # =====================================================================
  # HKUST-1 + CO2 — classical paddle-wheel example
  # =====================================================================
  - schema_version: "0.4"
    material_id: "HKUST-1"
    gas: "CO2"
    label: "Cu_paddle_wheel"
    centroid_frac: [0.250, 0.250, 0.000]
    coordination_distance_A: 3.1
    site_kind: "open_metal_site"
    notes: |
      Cu2 paddle-wheel cluster — primary CO2 site. The brief §3 cites in-situ
      X-ray + neutron diffraction studies; the Wyckoff representative used
      here is for the Fm-3m HKUST-1 setting.
    provenance:
      citation:
        doi: "10.1021/ja3055639"
        source: "Wu, Simmons, Liu, Brown, Yildirim. Neutron-diffraction studies on the role of open metal sites in CO2 adsorption in HKUST-1. JACS 134, 14465 (2012). Verify exact DOI before flagship use."
      measurement_method: "experimental_neutron"
      redistribution_status: "open_access_with_attribution"

  # =====================================================================
  # UiO-66 + CO2 — already in widom_atlas.sites; replicated here with
  # full registry-grade provenance.
  # =====================================================================
  - schema_version: "0.4"
    material_id: "UiO-66"
    gas: "CO2"
    label: "octahedral_cage_centre"
    centroid_frac: [0.500, 0.500, 0.500]
    coordination_distance_A: null
    site_kind: "cage_centre"
    notes: |
      Dominant low-loading CO2 host. Same coordinates carried in
      widom_atlas.sites.EXPECTED_SITES.
    provenance:
      citation:
        doi: "10.1021/la3046309"
        source: "Cmarik et al. Langmuir 28, 15606 (2012) — UiO-66 + CO2 isotherms."
      measurement_method: "experimental_isotherm"
      redistribution_status: "open_access_with_attribution"

  - schema_version: "0.4"
    material_id: "UiO-66"
    gas: "CO2"
    label: "tetrahedral_cage_centre"
    centroid_frac: [0.250, 0.250, 0.250]
    coordination_distance_A: null
    site_kind: "secondary"
    notes: |
      Secondary, smaller cage. Less attractive than the octahedral cage.
    provenance:
      citation:
        doi: "10.1021/jp1108025"
        source: "Yang et al. J. Phys. Chem. C 115, 3500 (2011) — UiO-66 cage analysis."
      measurement_method: "DFT"
      redistribution_status: "open_access_with_attribution"

  # =====================================================================
  # ZIF-8 sodalite cage centre — for both CO2 and CH4
  # =====================================================================
  - schema_version: "0.4"
    material_id: "ZIF-8"
    gas: "CO2"
    label: "sodalite_cage_centre"
    centroid_frac: [0.000, 0.000, 0.000]
    coordination_distance_A: null
    site_kind: "cage_centre"
    notes: |
      I-43m setting; cage centre at the (0, 0, 0) Wyckoff site.
    provenance:
      citation:
        doi: "10.1073/pnas.0602439103"
        source: "Park et al. PNAS 103, 10186 (2006) — ZIF-8 + CO2 binding."
      measurement_method: "experimental_isotherm"
      redistribution_status: "open_access_with_attribution"

  - schema_version: "0.4"
    material_id: "ZIF-8"
    gas: "CH4"
    label: "sodalite_cage_centre"
    centroid_frac: [0.000, 0.000, 0.000]
    coordination_distance_A: null
    site_kind: "cage_centre"
    notes: |
      Same site as CO2 by symmetry; CH4 occupies it at low loading.
    provenance:
      citation:
        doi: "10.1002/chem.200902144"
        source: "Pérez-Pellitero et al. Chem. Eur. J. 16, 1560 (2010) — ZIF-8 + CH4."
      measurement_method: "experimental_isotherm"
      redistribution_status: "open_access_with_attribution"

  # =====================================================================
  # MOF-5 / IRMOF-1 alpha-pocket
  # =====================================================================
  - schema_version: "0.4"
    material_id: "MOF-5"
    gas: "CO2"
    label: "alpha_pocket_near_Zn4O"
    centroid_frac: [0.250, 0.250, 0.250]
    coordination_distance_A: null
    site_kind: "alpha_pocket"
    notes: |
      Wyckoff representative in Fm-3m. Walton 2008 / Saha 2010 confirm the
      α-pocket as the dominant low-loading site.
    provenance:
      citation:
        doi: "10.1021/ja076877g"
        source: "Walton et al. JACS 130, 406 (2008) — MOF-5 + CO2 isotherm steps."
      measurement_method: "experimental_isotherm"
      redistribution_status: "open_access_with_attribution"
