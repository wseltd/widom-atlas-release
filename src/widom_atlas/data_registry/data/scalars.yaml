# widom-atlas literature reference scalars — v0.4 entries.
#
# Each entry is a `ScalarReferenceEntry` (see widom_atlas.data_registry.schema).
# The package currently ships a smaller set under
# src/widom_atlas/benchmarks/data/mofxdb_cache/ for bundled-safe scalar
# comparison rows; this registry is the broader, citation-rich, redistribution-
# tracked set the v0.4 brief mandates.
#
# DOIs come verbatim from the brief and from FINAL_CUSPAI_DELIVERY_AUDIT.md §7.

scalars:

  # =====================================================================
  # Mg-MOF-74 + CO2 — open metal site, primary v0.4 calibration target
  # =====================================================================
  - schema_version: "0.4"
    material_id: "Mg-MOF-74"
    gas: "CO2"
    temperature_K: 298.15
    pressure_Pa: null
    KH_value: 8.0e-5
    KH_units: "mol/(kg*Pa)"
    Qads_value: 47.0
    Qads_units: "kJ/mol"
    Qads_sign_convention: "binding_strength_positive"
    provenance:
      citation:
        doi: "10.1021/ja8036096"
        source: "Caskey, Wong-Foy, Matzger. Dramatic tuning of carbon dioxide uptake via metal substitution in a coordination polymer with cylindrical pores. JACS 130, 10870 (2008)."
        url: "https://pubs.acs.org/doi/10.1021/ja8036096"
      measurement_method: "experimental_isotherm"
      redistribution_status: "open_access_with_attribution"
      notes: |
        Frequently cited as the canonical Mg-MOF-74 CO2 binding strength.

