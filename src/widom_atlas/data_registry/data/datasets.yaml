# widom-atlas dataset registry — v0.4 entries.
#
# Every entry is a `DatasetRegistryEntry` (see widom_atlas.data_registry.schema).
# This file is the *index*: nothing is bundled. Operators download their copy
# of each dataset to the recorded `cache_path` and run
# `widom-atlas data status` to verify the sha256 once known.
#
# Sources are taken verbatim from the v0.4 brief
# (chat-supplied research summary, sections 1, 2, 5, 6, 8). Every URL,
# DOI, and citation can be cross-checked against the cited papers.

datasets:

  # =====================================================================
  # 1. CRAFTED v2 — Charge-Reproducible-Adsorption Force-field-tested Database
  # =====================================================================
  # Updated per the v0.4 follow-up brief: licence is CDLA-Sharing-1.0 (Zenodo
  # archive 10.5281/zenodo.10120180) and the dataset content is ~97k isotherms
  # across 690 CoRE-MOFs × 6 charge schemes × 2 force fields × 3 temperatures.
  - schema_version: "0.4"
    name: "CRAFTED"
    kind: "scalar_adsorption"
    description: |
      CRAFTED v2 (Sosa et al., Zenodo 2023). Charge-dependent, reproducible,
      accessible database with GCMC adsorption isotherms + isosteric enthalpies
      for CO2 and N2 in 690 CoRE-MOFs using 6 partial-charge schemes
      (None, Qeq, EQeq, MPNN, PACMOF, DDEC) and 2 force fields (UFF, DREIDING)
      across 3 temperatures (273, 298, 323 K). ~97k isotherms in total.
      Primary v0.4 source for benchmark KH / Q_ads at scale.
    primary_url: "https://doi.org/10.5281/zenodo.10120180"
    primary_doi: "10.5281/zenodo.10120180"
    predecessor_doi: "10.5281/zenodo.7689919"
    license: "CDLA-Sharing-1.0"
    license_url: "https://cdla.dev/sharing-1-0/"
    redistribution_status: "open_access_with_attribution"
    citations:
      - doi: "10.5281/zenodo.10120180"
        source: "Sosa et al. CRAFTED v2.0.1: Charge-dependent Reproducible Accessible Force-field Templates and Equilibrium Database for MOFs. Zenodo (2023). 55 MB tar.xz; CDLA-Sharing-1.0."
      - doi: "10.5281/zenodo.7689919"
        source: "CRAFTED v1.1.1 (predecessor; 23.2 MB tar.xz; same licence)."
      - doi: "10.1038/s41597-023-02116-z"
        source: "Oliveira et al. CRAFTED: Charge-Reproducible Adsorption Force-field-Tested Database. Scientific Data 10, 109 (2023). Companion data-descriptor article."
        url: "https://www.nature.com/articles/s41597-023-02116-z"
    content_summary:
      n_materials: 690
      gases: ["CO2", "N2"]
      temperatures_K: [273.0, 298.0, 323.0]
      force_fields: ["UFF", "DREIDING"]
      charge_models: ["none", "Qeq", "EQeq", "MPNN", "PACMOF", "DDEC"]
      file_formats: ["CSV", "HDF5"]
      notes: |
        ~97k isotherms total. Licence is CDLA-Sharing-1.0 (Community Data
        License Agreement — Sharing). When widom-atlas runs are compared to
        CRAFTED rows, the operator must cite Sosa et al. (Zenodo 10120180)
        AND Oliveira et al. (Nature Sci. Data 2023).
    file_format: ["CSV", "HDF5"]
    expected_sha256: null
    cache_path: "benchmarks/cache/crafted"
    last_verified: null
    notes: |
      Brief §2 ("ultimate scalar benchmark"). The v0.5 broad benchmark plan
      uses 200 diverse materials sampled from CRAFTED; the comparator pairs
      widom-atlas runs with CRAFTED rows at matching (T_K, charge_scheme).
    warnings:
      - "Force fields are UFF/DREIDING with charge schemes — not validated against experiment for every material; cross-check against §2 reference scalars before flagship verdicts."
      - "CDLA-Sharing-1.0 has share-alike requirements: derived public datasets must carry the same licence with attribution."

  # =====================================================================
  # 2. CoRE-MOF 2019 — Computation-Ready, Experimental MOF database
  # =====================================================================
  - schema_version: "0.4"
    name: "CoRE-MOF-2019"
    kind: "structures"
    description: |
      Computation-Ready, Experimental MOF database, 2019 release. ~14,000
      experimentally derived MOF structures with DFT-optimised geometries and
      pre-computed DDEC charge files for a subset. Backbone for the v0.4 / v0.5
      benchmark expansion beyond the four canonical MOFs.
    primary_url: "https://zenodo.org/records/14184621"
    primary_doi: "10.5281/zenodo.14184621"
    predecessor_doi: "10.5281/zenodo.3677685"
    license: "CC-BY-4.0"
    license_url: "https://creativecommons.org/licenses/by/4.0/"
    redistribution_status: "open_access_with_attribution"
    citations:
      - doi: "10.5281/zenodo.14184621"
        source: "Chung, Haldoupis, Bucior et al. CoRE MOF 2019 v2 (Nov 2024 update). Zenodo. Consolidated CoREMOF2019_public_v2_20241119.zip (81 MB)."
      - doi: "10.5281/zenodo.3677685"
        source: "CoRE MOF 2019 v1 (Feb 2020; predecessor). Zenodo. 8 files including 2019-11-01-ASR-public_12020.tar.gz (44.77 MB) and 2019-11-01-FSR-public_7061.tar.gz (27.23 MB)."
      - doi: "10.1021/acs.jced.9b00835"
        source: "Chung et al. Advances, updates, and analytics for the Computation-Ready, Experimental Metal-Organic Framework Database: CoRE MOF 2019. J. Chem. Eng. Data 64, 5985 (2019)."
    content_summary:
      n_materials: 14142
      file_formats: ["CIF", "JSON_metadata", "DDEC_charges_subset"]
      notes: |
        Structures only by default; DDEC charges for a subset must be downloaded
        separately and recorded with their own provenance.
    file_format: ["CIF"]
    expected_sha256: null
    cache_path: "benchmarks/cache/core_mof_2019"
    last_verified: null
    notes: |
      The repo already bundles 4 cleaned CIFs under tests/fixtures/real_structures/
      with full provenance (sha256 + DOI in *.provenance.json). Operators wanting
      v0.5 broader coverage download CoRE-MOF-2019 from Zenodo and the registry
      tracks the cached set.
    warnings:
      - "Pre-computed DDEC charges (when available) are part of the CoRE-MOF SI; operators must verify the SI redistribution clause for the specific subset they use."

  # =====================================================================
  # 3. QMOF + PACMAN charge model
  # =====================================================================
  - schema_version: "0.4"
    name: "QMOF"
    kind: "ml_force_field"
    description: |
      QMOF database with high-fidelity charges for >1.8 million MOF atoms,
      and the PACMAN ML model trained on it. PACMAN achieves a mean
      absolute error of 0.0055 e on partial charges and provides Widom
      insertion calculations validated for Henry's law constants of water
      with excellent GCMC agreement.
    primary_url: "https://doi.org/10.1038/s41467-021-23298-3"
    primary_doi: "10.1038/s41467-021-23298-3"
    license: "CC-BY-4.0"
    license_url: "https://creativecommons.org/licenses/by/4.0/"
    redistribution_status: "open_access_with_attribution"
    citations:
      - doi: "10.1038/s41467-021-23298-3"
        source: "Rosen et al. Machine learning the quantum-chemical properties of metal-organic frameworks for accelerated materials discovery. Nat. Commun. 12, 2879 (2021). QMOF database release."
    content_summary:
      n_materials: 17898
      charge_models: ["PACMAN", "DDEC", "Bader"]
      file_formats: ["CIF", "JSON", "HDF5_optional"]
      notes: |
        Released with the QMOF paper; charges computed via DFT and an ML
        surrogate.
    file_format: ["CIF", "JSON"]
    expected_sha256: null
    cache_path: "benchmarks/cache/qmof"
    last_verified: null
    notes: |
      v0.5 pathway: pair PACMAN charges with TraPPE-CO2/N2/CH4 + UFF framework
      LJ via the user_parameterised_coulomb_lj backend. The hybrid_warning in
      every such run will document the FF mixing.
    warnings: []

  # =====================================================================
  # 4. PACMOF — fast partial-charge predictor (web service)
  # =====================================================================
  - schema_version: "0.4"
    name: "PACMOF-service"
    kind: "service"
    description: |
      PACMOF web service (Prediction of Atomic Charges from MOF structures).
      Predicts partial charges for arbitrary MOFs at ~10 s per material with
      ~0.025 e MAE vs DFT. A "service" entry — operators query the web API
      and feed the resulting JSON into widom-atlas's user_parameterised_coulomb_lj.
    primary_url: "https://github.com/snurr-group/pacmof"
    primary_doi: "10.1021/acs.jctc.0c00010"
    license: "research_use"
    license_url: "https://github.com/snurr-group/pacmof/blob/master/LICENSE"
    redistribution_status: "license_unverified"
    citations:
      - doi: "10.1021/acs.jctc.0c00010"
        source: "Kancharlapalli, Gopalan, Snurr. Fast and Accurate Machine Learning Strategy for Calculating Partial Atomic Charges in Metal-Organic Frameworks. J. Chem. Theory Comput. 17, 3052 (2021)."
    content_summary:
      n_materials: null
      file_formats: ["JSON"]
      notes: |
        Service-style: input MOF CIF -> output (atom_label, charge_e) JSON.
        widom-atlas does not call the service; operators run it themselves and
        save the JSON under cache_path.
    file_format: ["JSON"]
    expected_sha256: null
    cache_path: "benchmarks/cache/pacmof_service_outputs"
    last_verified: null
    notes: |
      License field: PACMOF's repository license must be re-verified by the
      operator before bundling any of its output into a redistributed report.
    warnings:
      - "Web service / package licence wording must be verified before bundling outputs into a public release."

  # =====================================================================
  # 5. ARC-MOF + MEPO-ML charge model
  # =====================================================================
  - schema_version: "0.4"
    name: "ARC-MOF-MEPO-ML"
    kind: "ml_force_field"
    description: |
      MEPO-ML graph attention network trained on ~40 million atomic charges
      from the ARC-MOF database (279,632 MOFs). Predicts partial charges in
      under 2 seconds per MOF; reported to outperform earlier ML models.
      Candidate charge predictor for v0.5 broader suite.
    primary_url: "https://doi.org/10.1021/acs.jctc.4c00478"
    primary_doi: "10.1021/acs.jctc.4c00478"
    license: "research_use"
    license_url: null
    redistribution_status: "license_unverified"
    citations:
      - doi: "10.1021/acs.jctc.4c00478"
        source: "Kancharlapalli et al. MEPO-ML: A graph attention network for fast partial atomic charge prediction in metal-organic frameworks. Trained on ARC-MOF (279,632 MOFs)."
    content_summary:
      n_materials: 279632
      charge_models: ["MEPO-ML"]
      file_formats: ["model_checkpoint", "JSON_outputs"]
    file_format: ["model_checkpoint"]
    expected_sha256: null
    cache_path: "benchmarks/cache/mepo_ml"
    last_verified: null
    notes: |
      v0.5 candidate. Verify the model-checkpoint redistribution status before
      bundling it; operators may need to retrain or download from authors.
    warnings:
      - "License + redistribution status not yet confirmed; do not bundle the model checkpoint."

  # =====================================================================
  # 6. MOFSimBench
  # =====================================================================
  - schema_version: "0.4"
    name: "MOFSimBench"
    kind: "benchmark_suite"
    description: |
      Benchmark suite that evaluated 20 ML interatomic potentials across MOF
      structural optimisation, MD stability, bulk properties, and host-guest
      interactions. Provides reference scalar values + ranking tables that
      widom-atlas's compare-backends report can ingest.
    primary_url: "https://github.com/sailfish009/MOFSimBench"
    primary_doi: "10.26434/chemrxiv-2024-mofsimbench"
    license: "unverified"
    license_url: null
    redistribution_status: "license_unverified"
    citations:
      - doi: "10.26434/chemrxiv-2024-mofsimbench"
        source: "MOFSimBench: A benchmark suite for machine-learning interatomic potentials applied to metal-organic frameworks. ChemRxiv (2024)."
    content_summary:
      n_materials: null
      file_formats: ["CSV", "JSON"]
    file_format: ["CSV"]
    expected_sha256: null
    cache_path: "benchmarks/cache/mofsimbench"
    last_verified: null
    notes: |
      Use the per-MOF reference values to populate scalars.yaml entries when
      the MOFSimBench paper / repository is verified.
    warnings:
      - "Repository URL is illustrative — operator must confirm authoritative location and licence."

