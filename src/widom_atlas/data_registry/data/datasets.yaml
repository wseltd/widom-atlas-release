  # =====================================================================
  # 12. Dzubak Mg-MOF-74 specific force field (paper SI)
  # =====================================================================
  # Brief §6 / §3 ("Specific FF: Dzubak Mg-MOF-74 / Necessary for accurate
  # Mg-CO2 interaction if generic UFF fails"). This is a parameter-table
  # entry — widom-atlas does not bundle the values; operator extracts from
  # the paper SI.
  - schema_version: "0.4"
    name: "Dzubak-MgMOF74-CO2-FF"
    kind: "force_field_parameters"
    description: |
      Material-specific force field for CO2 in Mg-MOF-74 from Dzubak et al.
      Nature Chemistry 4, 810-816 (2012). Derived from QM/CCSD(T); reproduces
      experimental isosteric heats. Necessary when generic UFF underestimates
      Mg-CO2 binding by ≥30 kJ/mol (the v0.2 LJ-only failure mode documented
      in BACKEND_FAILURE_ANALYSIS.md).
    primary_url: "https://doi.org/10.1038/nchem.1432"
    primary_doi: "10.1038/nchem.1432"
    license: "research_use"
    license_url: null
    redistribution_status: "user_supplied_not_bundled"
    citations:
      - doi: "10.1038/nchem.1432"
        source: "Dzubak, Lin, Kim, Swisher, Poloni, Maximoff, Smit, Gagliardi. Ab initio carbon capture in open-site metal-organic frameworks. Nature Chemistry 4, 810 (2012)."
    content_summary:
      n_materials: 1
      materials_subset: ["Mg-MOF-74"]
      gases: ["CO2"]
      force_fields: ["custom_QM_derived"]
      charge_models: ["custom_QM"]
      file_formats: ["paper_SI_table"]
      notes: |
        Parameters live in the paper SI; redistribution status is
        unverified. Operator extracts the (atom_label, charge_e, σ_Å, ε_K)
        table into a UserParameterFile (see widom_atlas.backends.user_parameterised),
        cites Dzubak 2012, and runs the user_parameterised_coulomb_lj backend.
    file_format: ["paper_SI"]
    expected_sha256: null
    cache_path: "benchmarks/cache/dzubak_mgmof74_co2"
    last_verified: null
    notes: |
      Path to flagship Mg-MOF-74 + CO2 results. Brief §6 explicitly flags
      this as needed when "generic UFF fails", which v0.2 evidence confirmed.
    warnings:
      - "Parameter table is in Dzubak 2012 SI — redistribution status not verified by widom-atlas authors. Operator must extract + cite under their own provenance."

  # =====================================================================
  # 13. MACE-MP-0 — Foundation-model ML force field
  # =====================================================================
  - schema_version: "0.4"
    name: "MACE-MP-0"
    kind: "ml_force_field"
    description: |
      MACE-MP-0 foundation MLIP (Materials Project pre-trained equivariant
      graph neural network). Predicts DFT-quality energies + forces for any
      geometry. Per the brief §7, "borderline" for 100k blind-grid Widom
      insertions due to inference cost; useful for evaluating pre-selected
      basin centroids and as a comparison engine via external_samples.
    primary_url: "https://github.com/ACEsuit/mace-mp"
    primary_doi: "10.48550/arXiv.2401.00096"
    license: "MIT"
    license_url: "https://github.com/ACEsuit/mace-mp/blob/main/LICENSE"
