        source: "CoRE MOF 2019 release (Zenodo) — DDEC subset."
    content_summary:
      n_materials: null
      charge_models: ["DDEC"]
      file_formats: ["JSON", "CIF_with_charges"]
    file_format: ["JSON"]
    expected_sha256: null
    cache_path: "benchmarks/cache/core_mof_ddec"
    last_verified: null
