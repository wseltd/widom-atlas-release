      Operator runs the CoRE-MOF DDEC download; widom-atlas's
      user_parameterised_coulomb_lj backend consumes the resulting per-MOF JSON.
    warnings: []

  # =====================================================================
  # 8. ODAC25 — Open Direct Air Capture 2025 (FAIR Chemistry, HuggingFace)
  # =====================================================================
  # Brief §2 ("ultimate basin/ML benchmark"): 70M DFT single-point calculations
  # of CO2 + H2O in 15k MOFs. Used to validate raw energy surfaces and basin
  # robustness without force-field bias.
  - schema_version: "0.4"
    name: "ODAC25"
    kind: "ml_force_field"
    description: |
      Open Direct Air Capture 2025 dataset. 70 million DFT single-point
      calculations of CO2 and H2O configurations in ~15,000 MOFs. Released
      by FAIR Chemistry on HuggingFace. Suitable for raw-energy / basin
      validation, ML force-field training, and as a calculator-disagreement
      benchmark.
    primary_url: "https://huggingface.co/datasets/fairchem/ODAC25"
    primary_doi: "10.57967/hf/ODAC25"
    license: "CC-BY-4.0"
    license_url: "https://creativecommons.org/licenses/by/4.0/"
    redistribution_status: "open_access_with_attribution"
    citations:
      - doi: "10.57967/hf/ODAC25"
        source: "FAIR Chemistry. ODAC25: Open Direct Air Capture 2025 dataset. HuggingFace (2025). 70M DFT single-points for CO2 + H2O in ~15k MOFs."
        url: "https://huggingface.co/datasets/fairchem/ODAC25"
    content_summary:
      n_materials: 15000
      gases: ["CO2", "H2O"]
      file_formats: ["LMDB", "ASE-DB", "HDF5"]
      notes: |
        ~70M single-point DFT energies. Brief §2 flags this as the "ultimate
        basin/ML benchmark". Operator must verify the exact HuggingFace URL
        and DOI before flagship use; the DOI shown is FAIR Chemistry's
        HuggingFace-style citation rather than a Crossref DOI.
    file_format: ["LMDB", "HDF5"]
    expected_sha256: null
    cache_path: "benchmarks/cache/odac25"
    last_verified: null
    notes: |
      v0.5 candidate. Per the brief: "Borderline" for 100k-insertion runtime
      with general-purpose MACE-MP-0; better paired with the ODAC25 MACE
      models (separate registry entry below) for accuracy on its training
      domain.
    warnings:
      - "Verify the exact HuggingFace dataset slug + DOI before bundling references; the brief gives the dataset name but the precise URL must be operator-confirmed."

  # =====================================================================
  # 9. NIST ISODB — Adsorption isotherm experimental database
  # =====================================================================
  # Brief §2 ("experimental scalar benchmark"). Public-domain via REST API.
  - schema_version: "0.4"
    name: "NIST-ISODB"
    kind: "scalar_adsorption"
    description: |
      NIST Adsorption Isotherm Database (ISODB). Parsed experimental
      isotherms across thousands of (material, gas, T) triples; covers the
      Henry regime + heats of adsorption when reported. Public-domain via
      REST API. v0.4 experimental scalar reference for like-for-like
      comparison against widom-atlas / RASPA / CRAFTED simulated values.
    primary_url: "https://adsorption.nist.gov/isodb/"
    primary_doi: "10.18434/T43882"
    license: "public_domain_us_government"
    license_url: "https://www.nist.gov/disclaimer"
    redistribution_status: "open_access_with_attribution"
    citations:
      - doi: "10.18434/T43882"
        source: "Siderius et al. NIST/ARPA-E Database of Novel and Emerging Adsorbent Materials (NIST ISODB). National Institute of Standards and Technology."
        url: "https://adsorption.nist.gov/isodb/api/api.html"
    content_summary:
      n_materials: null
      gases: ["CO2", "N2", "CH4", "H2", "Xe", "Kr", "Ar", "H2O", "C2H4", "C2H6", "C3H8", "CO"]
      file_formats: ["JSON_REST"]
      notes: |
        REST API, no bulk download. Operator queries by material + gas + T;
        widom-atlas's data_registry.list_scalar_references() can mirror the
        Henry-regime values into scalars.yaml after the operator runs the
        REST client.
    file_format: ["JSON"]
    expected_sha256: null
    cache_path: "benchmarks/cache/nist_isodb_responses"
    last_verified: null
    notes: |
      v0.4 plan: pull Henry coefficients for the 4 priority MOFs (UiO-66,
      Mg-MOF-74, ZIF-8, MOF-5) + zeolites (MFI, FAU, LTA, CHA) + Cu-BTC, save
      JSON responses under cache_path, then add ScalarReferenceEntry rows
      with measurement_method=experimental_isotherm and citation per ISODB
      record's source field.
    warnings:
      - "REST API is operator-driven — no bulk downloader bundled."

  # =====================================================================
  # 10. MOFX-DB — Snurr Group RASPA-simulated database
  # =====================================================================
  - schema_version: "0.4"
    name: "MOFX-DB"
    kind: "scalar_adsorption"
    description: |
      MOFX-DB (Snurr Group, Northwestern). High-throughput RASPA-simulated
      Henry coefficients, isotherms, and selectivities across CoRE-MOF /
      hMOF. Accessible via the `mofdb_client` Python package; broad
      coverage but simulation-derived rather than experimental.
    primary_url: "https://mof.tech.northwestern.edu/"
    primary_doi: "10.1021/acs.jced.9b00835"
    license: "research_use"
    license_url: "https://mof.tech.northwestern.edu/about"
    redistribution_status: "open_access_with_attribution"
    citations:
      - doi: "10.1021/acs.jced.9b00835"
        source: "Bobbitt et al. (Snurr group). MOFX-DB: An online database of metal-organic framework adsorption properties."
        url: "https://github.com/snurr-group/mofdb-client"
    content_summary:
      n_materials: null
      gases: ["CO2", "N2", "CH4", "H2", "Xe", "Kr"]
      force_fields: ["UFF"]
      file_formats: ["JSON", "Python_client"]
      notes: |
        Use the `mofdb_client` Python package (Snurr group GitHub) to query
        the database. Returns simulated Henry coefficients + isotherms.
    file_format: ["JSON"]
    expected_sha256: null
    cache_path: "benchmarks/cache/mofxdb_client_outputs"
    last_verified: null
    notes: |
      Simulation-derived, like CRAFTED but with different default FF / charge
      choices. Use as a *cross-check* on simulated KH; not as an experimental
      reference.
    warnings:
      - "Simulation-only; do not treat as experimental ground truth."

