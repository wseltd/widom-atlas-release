        verdict_tier: "flagship_strict"
        numeric_thresholds: "flagship_strict"
        framework:
          name: "Mg-MOF-74"
          csd_refcode: "VOGTIV"
          source_cif_path: "docs/research/dataset-research-for-v0.4/15/core-mof-sep2014/core-mof-july2014/VOGTIV_clean_h.cif"
          source_doi: "10.1021/cm502594j"
          source_license: "CC-BY-4.0"
          cell_convention: "P1 expanded; rhombohedral primitive accepted"
          # Sublattice-specific atom labels (blocker 3) - required for correct
          # Buckingham parameter and charge assignment.
          atom_label_map:
            Mg: "Mof_Mg"
            O_metal_node_a: "Mof_Oa"        # OMS-binding O on the Mg metal node (apical)
            O_metal_node_b: "Mof_Ob"        # bridging O within the Mg-O chain
            O_aromatic_phenoxide: "Mof_Oc"  # aromatic phenoxide O
            C_aromatic_attached_to_O: "Mof_Ca"
            C_aromatic_meta: "Mof_Cb"
            C_aromatic_para: "Mof_Cc"
            C_carboxylate: "Mof_Cd"
            H_aromatic: "Mof_H"
          atom_label_assignment_method: "geometry_based_relabelling_test"
          atom_label_self_test_required: true
        force_field:
          lineage: "Lin_2014_Mercado_Model_4"
          functional_form: "BUCKINGHAM_A_EXP_C6"
          # Corrected DOI (blocker 1)
          source_doi: "10.1021/ct500094w"
          source_path: "docs/research/dataset-research-for-v0.4/9/lin_2014_jctc_si.pdf"
          notes: "SI Table S7. Single-attraction-term form A·exp(-B·r) - S_g·C/r^6."
          # Mercado/Lin file stores the scaled dispersion coefficient already (blocker 5).
          # Implementation must NOT multiply by S_g a second time.
          C_already_scaled: true
        gas:
