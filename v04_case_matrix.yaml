          method: "Atomic partial charges from Lin 2014 JCTC SI charge table (not LoProp)"
          source_doi: "10.1021/ct500094w"
          source_path: "docs/research/dataset-research-for-v0.4/9/lin_2014_jctc_si.pdf"
        # Per-branch electrostatics + LJ cutoff convention (blocker 4)
        electrostatics_per_branch:
          ewald_via_raspa3: true
          direct_cutoff_angstrom: 12.8
          lj_treatment: "truncated_only"        # Match Lin/Mercado/Dzubak primary convention
          lj_tail_correction: false
        references:
          # K_H reference re-audited 2026-05-18 against Mason 2011 SI Table S6 DSL
          # parameters + Vandenbrande 2018 JCTC Table 2 triangulation (Mason/Yu/
          # Queen experimental cluster). See V04_MASON_2011_REFERENCE_AUDIT.md
          # §"REVISION 2026-05-18". Atlas 1a still FAILs Δlog10 +1.77 vs 381.
          K_H:
            value: 381.0
            units: "mol/(kg*bar)"
            temperature_K: 298.15
            acceptance_window_min: 384.0   # Vandenbrande Mason
            acceptance_window_max: 414.0   # Vandenbrande Yu
            source: "Mason_2011_EES SI Table S6 dual-site Langmuir K_H(T) + Vandenbrande 2018 JCTC Table 2 triangulation"
            source_doi: "10.1039/c1ee01720a"
            triangulation_doi: "10.1021/acs.jctc.8b00892"
            method: "fitted_isosteric_heat_dual_site_Langmuir"
            derivation: |
              K_H(T) = q_A,sat * b_A,0 * exp(E_A/RT) + q_B,sat * b_B,0 * exp(E_B/RT)
              with Mason SI Table S6 parameters (DSL fit on 278-473 K isotherms):
                q_A,sat = 6.8 mol/kg, b_A,0 = 2.44e-11 Pa^-1, E_A = 42.0 kJ/mol
                q_B,sat = 9.9 mol/kg, b_B,0 = 1.39e-10 Pa^-1, E_B = 24.0 kJ/mol
              At T = 298.15 K: K_H = 380.6 mol/(kg.bar). Vandenbrande 2018 Table 2
              compiles independent Mason (384), Yu (414), Queen (407) values
              clustering at 384-414 mol/(kg.bar).
            audit_evidence: "V04_MASON_2011_REFERENCE_AUDIT.md (revised 2026-05-18)"
            legacy_first_point_value: 187.0
            legacy_first_point_R2: 0.887
            legacy_linfit_3low_value: 216.0
            paper_table_1_value: 265.0
          Q_st:
            low_loading_value: 42.0
            high_loading_value: 24.0
            saturation_loading_mmol_per_g: 6.0
            units: "kJ/mol (positive exothermic magnitude)"
            acceptance_window_min: 39.0    # Britt
            acceptance_window_max: 44.0    # Queen
            source: "Mason 2011 SI Table S6 DSL E_A (42 kJ/mol) + Vandenbrande triangulation (Britt -39, Mason -42, Yu -42, Queen -44)"
            source_doi_primary: "10.1039/c1ee01720a"
            source_doi_triangulation: "10.1021/acs.jctc.8b00892"
            source_doi_secondary: "10.1039/C0EE00700E"
            method: "fitted_isosteric_heat_dual_site_Langmuir"
            audit_evidence: "V04_MASON_2011_REFERENCE_AUDIT.md (revised 2026-05-18)"
            legacy_value: 42.0
