# widom-atlas v0.4 case matrix
# LOCKED v04.2 (2026-05-11). Supersedes v04.1.
# Addresses 15 professor-flagged blockers (see V04_LOCKED_SPEC_CHANGELOG.md).
#
# This file is the ONLY input the coder is permitted to work from
# (along with V04_LOCKED_SPEC.md). All RASPA3 inputs, force-field tables,
# references, and validation tolerances must be derived from this matrix
# programmatically. No manual patching of derived files.

schema_version: "v0.4.2"   # v0.4.2 (2026-06-21): 2a/3a genuine-UFF rebuild (generator mislabel fixed) -> 2a Tier-B, 3a Tier-A strict; 4c demoted to Tier-B (engine-marginal Q_st; native<->RASPA3 ~9%); native charged-MOF Ewald disclosed-unreliable; parity-claim corrections; 1c Becker defect disclosed. Tally: strict 2/15 (6c,3a), Tier-B 5/15 (6c,3a,2a,4c,3b_EHq). See V04_LOCKED_SPEC_CHANGELOG.md. v0.4.1 (2026-06-18): 6c silicon double-count correction + reference K_H 0.224->0.200 + Olson rebuild. Prior internal labels: v04.2 (2026-05-11), v04.3 (2026-06-01 4c/6e/3b promotions).
spec_document: "V04_LOCKED_SPEC.md"
spec_sha256: "2c7bbf48cc53e8c9dadd9ec3cf266afe0be7d3d4fe6e0e81383f096c8f508720"  # OP10 RESOLVED 2026-05-11
locked_date: "2026-05-11"
supersedes: "v04.1"

# Global defaults inherited by every branch unless overridden.
# NOTE: cutoff, lj_treatment, and tail correction are PER-BRANCH (blocker 4),
# not global. They are absent from this section deliberately.
defaults:
  temperature_K: 298.0
  electrostatics:
    strict_engine: "raspa3"        # Ewald via RASPA3 binary
    screening_backend: "wolf"      # widom-atlas internal; not used for strict verdict
    # OP1 RESOLVED 2026-05-12: RASPA3 v3.0.29 from conda-forge.
    raspa3_pinned_commit: "3fdb4a1c4ba468ebea66d1a8619404e05aa800bb"  # upstream tag v3.0.29
    raspa3_version_string: "v3.0.29 (conda-forge build h93d69b2_300)"
    raspa3_install_command: "conda create -n raspa3 -c conda-forge raspa3=3.0.29 -y"
    raspa3_binary_path: "~/miniconda3/envs/raspa3/bin/raspa3"
    raspa3_binary_sha256: "2b4132becc0f38dedb2de470386defe9956d8129307e70dc7fcd0d6f03d57732"
    raspa3_smoke_test: "examples/basic/7_mc_henry_coefficient_of_methane_in_mfi (PASSED 2026-05-12; produced K_H = 6.43e-6 mol/kg/Pa for MFI+CH4 at 298 K, 100000 Widom insertions)"
  mixing_rule: "lorentz_berthelot"
  insertions_min: 100000
  seeds_min: 3
  convergence_tolerance_KH_percent: 5.0
  density_grid_spacing_max_angstrom: 1.0

# Validation thresholds applied per branch
thresholds:
  flagship_strict:
    delta_log10_KH_max: 0.10
    delta_Qads_kJ_per_mol_max: 2.0
  broad_tier:
    # Updated v04.2 per blocker 7 to match prior locked research (was 0.30 / 5.0).
    delta_log10_KH_max: 0.20
    delta_Qads_kJ_per_mol_max: 4.0
  # Site-truth tolerances are PER-BRANCH (blocker 12), not global.
  site_truth_global_defaults: null

# Valid validation-tier tags
tier_vocabulary:
  - reference_anchored
  - ff_literature_refined
  - ff_fallback
  - scalar_only
  - site_truth_available
  - configuration_conditional
  - exploratory
  - broad_tier
  - numerical_test_only

# Status enumeration per branch (blockers 6, 14, 15)
status_vocabulary:
  - locked_strict                              # Strict branch fully ready
  - blocked_pending_op_extraction              # Strict branch awaiting OP completion; verdict BLOCKED until done
  - exploratory_runs_but_no_verdict_impact     # 5a-style
  - broad_tier_pending_operator_decision       # 4b-style
  - numerical_test_only_not_in_verdict         # 6d-style
  - deferred_not_in_v04_verdict                # 2b/3b-style (inactive in v0.4)

# Per-branch verdict tier semantics (blocker 8)
# verdict_tier: which threshold category the branch's pass/fail is measured against
# numeric_thresholds: which numerical tolerances are applied (may differ from verdict_tier when ff_fallback is present)
verdict_tier_vocabulary:
  - flagship_strict
  - flagship_strict_with_ff_fallback_relaxation  # Strict branch where ff_fallback presence relaxes numeric thresholds to broad_tier
  - broad_tier
  - not_applicable                             # exploratory / numerical_test_only / deferred

