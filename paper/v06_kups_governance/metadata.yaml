abstract: |
  A standalone report of the widom-atlas v0.6 work: the first published independent cross-engine
  validation of CuspAI's kUPS Widom estimator, and a four-configuration MLIP out-of-distribution
  governance demonstration on the potential kUPS ships. Every number traces to committed JSON in the
  version-controlled repository state.
